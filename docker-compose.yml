version: '3.9'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb-order:
    image: mongo:7
    ports:
      - '27017:27017'
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb-inventory:
    image: mongo:7
    ports:
      - '27018:27017'
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-order-init:
    image: mongo:7
    depends_on:
      mongodb-order:
        condition: service_healthy
    restart: 'no'
    command: >
      mongosh --host mongodb-order:27017 --eval
      "try { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'mongodb-order:27017' }]}) } catch(e) { print(e) }"

  mongo-inventory-init:
    image: mongo:7
    depends_on:
      mongodb-inventory:
        condition: service_healthy
    restart: 'no'
    command: >
      mongosh --host mongodb-inventory:27017 --eval
      "try { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'mongodb-inventory:27017' }]}) } catch(e) { print(e) }"

  order-service:
    build:
      context: ./order-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb-order:
        condition: service_healthy
      mongo-order-init:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb-order:27017/orderdb?replicaSet=rs0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: backend.async.challenge
      NODE_ENV: development
    ports:
      - '3001:3001'

  inventory-service:
    build:
      context: ./inventory-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb-inventory:
        condition: service_healthy
      mongo-inventory-init:
        condition: service_completed_successfully
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb-inventory:27017/inventorydb?replicaSet=rs0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: backend.async.challenge
      NODE_ENV: development
    ports:
      - '3002:3002'
